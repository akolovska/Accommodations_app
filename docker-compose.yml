services:

  db:
    image: postgres:17.4
    restart: always
    environment:
      POSTGRES_USER: emc
      POSTGRES_PASSWORD: emc
      POSTGRES_DB: rentals
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  backend:
    build:
      context: ./backend
    depends_on:
      - db
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata: